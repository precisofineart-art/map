<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Preciso Print Map</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260715-1" />
</head>
<body>
  <main id="map" aria-label="Product map"></main>

  <div id="google-ui" aria-label="Map controls">
    <div class="gm-zoom-control" role="group" aria-label="Zoom controls">
      <button id="gm-zoom-in" class="gm-zoom-button" type="button" aria-label="Zoom in">+</button>
      <div class="gm-zoom-divider" aria-hidden="true"></div>
      <button id="gm-zoom-out" class="gm-zoom-button" type="button" aria-label="Zoom out">-</button>
    </div>
  </div>

  <div id="marker-preview" class="marker-preview hidden" aria-hidden="true"></div>

  <aside id="desktop-sidebar" class="desktop-sidebar" aria-label="Desktop map menu">
    <div class="desktop-sidebar-top">
      <a href="https://precisoart.myshopify.com" target="_blank" rel="noopener noreferrer" class="desktop-brand" aria-label="Open Preciso store">
        <img src="logo.png" alt="Preciso" draggable="false">
      </a>
    </div>

    <div class="desktop-sidebar-scroll">
      <div class="desktop-menu-section">
        <div class="desktop-menu-label">Locations</div>
        <nav class="desktop-location-menu" aria-label="Map countries and states" data-location-menu>
          <div class="region-menu-group desktop-menu-group" data-country-group="usa">
            <button class="region-pill region-parent-pill desktop-menu-item desktop-menu-parent" type="button" data-region="country:usa" data-country-toggle="usa" data-region-menu-toggle aria-haspopup="true" aria-expanded="false" aria-controls="desktop-usa-region-menu">
              USA <span class="region-pill-caret" aria-hidden="true">v</span>
            </button>
            <div id="desktop-usa-region-menu" class="region-submenu desktop-region-submenu" aria-label="USA states" data-country-submenu="usa"></div>
          </div>
        </nav>
      </div>
    </div>

    <div id="desktop-marker-caption" class="desktop-marker-caption hidden" aria-hidden="true" aria-live="polite">
      <div id="desktop-marker-moment" class="desktop-marker-moment"></div>
      <div id="desktop-marker-title" class="desktop-marker-title"></div>
      <div id="desktop-marker-location" class="desktop-marker-location"></div>
      <div id="desktop-marker-time" class="desktop-marker-time"></div>
    </div>

    <div id="desktop-marker-actions" class="desktop-marker-actions hidden" aria-hidden="true">
      <section id="desktop-nearby" class="desktop-nearby hidden" aria-label="Explore nearby prints">
        <div class="desktop-nearby-top">
          <span>Explore nearby</span>
          <div class="desktop-nearby-nav">
            <button id="desktop-nearby-prev" type="button" aria-label="Previous nearby print">‹</button>
            <button id="desktop-nearby-next" type="button" aria-label="Next nearby print">›</button>
          </div>
        </div>
        <div id="desktop-nearby-list" class="desktop-nearby-list"></div>
      </section>

      <a id="desktop-marker-buy" class="desktop-marker-buy" href="#" target="_blank" rel="noopener noreferrer">
        Buy Print
      </a>
    </div>
  </aside>

  <section id="region-intro" class="region-intro hidden" aria-live="polite" aria-label="Selected map view">
    <div class="region-intro-copy">
      <div id="region-intro-title" class="region-intro-title"></div>
      <div id="region-intro-meta" class="region-intro-meta"></div>
    </div>
  </section>

  <aside id="place-sheet" class="place-sheet hidden" aria-label="Place details" aria-labelledby="sheet-title" aria-describedby="sheet-subtitle" aria-live="polite">
    <div class="place-sheet-handle"></div>

    <div class="place-sheet-header">
      <div class="sheet-copy">
        <h2 id="sheet-title"></h2>
        <div id="sheet-subtitle" class="sheet-subtitle"></div>
        <div id="sheet-location-2" class="sheet-location-2"></div>
        <div id="sheet-time" class="sheet-time"></div>
      </div>

      <div class="sheet-icon-actions">
        <button id="sheet-buy" type="button" aria-label="Buy print">
          <svg class="sheet-buy-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="8" cy="21" r="1"></circle>
            <circle cx="19" cy="21" r="1"></circle>
            <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path>
          </svg>
        </button>
        <button id="sheet-close" type="button" aria-label="Close place details">✕</button>
      </div>
    </div>

    <section id="sheet-nearby" class="sheet-nearby hidden" aria-label="Nearby prints">
      <div class="sheet-nearby-top">
        <span>Explore nearby</span>
        <div class="sheet-nearby-nav">
          <button id="nearby-prev" type="button" aria-label="Previous nearby print">‹</button>
          <button id="nearby-next" type="button" aria-label="Next nearby print">›</button>
        </div>
      </div>
      <div id="sheet-nearby-list" class="sheet-nearby-list"></div>
    </section>

    <div class="sheet-media">
      <img id="sheet-image-main" src="" alt="" loading="lazy" decoding="async" draggable="false">
    </div>

    <div class="sheet-cta">
      <a id="sheet-product-link" class="sheet-product-link" href="#" target="_blank" rel="noopener noreferrer">
        <span class="sheet-action-icon" aria-hidden="true">+</span>
        <span>Buy Print</span>
      </a>
      <button id="sheet-nearby-toggle" class="sheet-action-button" type="button">
        <span class="sheet-action-icon" aria-hidden="true">⌖</span>
        <span>Nearby</span>
      </button>
      <button id="sheet-photo-focus" class="sheet-action-button" type="button">
        <span class="sheet-action-icon" aria-hidden="true">▣</span>
        <span>Photo</span>
      </button>
    </div>
  </aside>

  <header id="header" class="app-header">
    <div class="header-stack">
      <div class="header-inner">
        <a href="https://precisoart.myshopify.com" target="_blank" rel="noopener noreferrer" class="logo-link" aria-label="Open Preciso store">
          <img src="logo.png" alt="Preciso" class="logo" draggable="false">
        </a>
      </div>

      <div class="region-pills" aria-label="Map countries" data-location-menu>
        <div class="region-menu-group" data-country-group="usa">
          <button class="region-pill region-parent-pill" type="button" data-region="country:usa" data-country-toggle="usa" data-region-menu-toggle aria-haspopup="true" aria-expanded="false" aria-controls="header-usa-region-menu">
            USA <span class="region-pill-caret" aria-hidden="true">v</span>
          </button>
          <div id="header-usa-region-menu" class="region-submenu" aria-label="USA states" data-country-submenu="usa"></div>
        </div>
      </div>
    </div>
  </header>

  <button id="mobile-active-country-button" class="mobile-active-country-button" type="button" aria-hidden="true"></button>
  <div id="mobile-state-tray" class="mobile-state-tray" aria-label="USA states" aria-hidden="true"></div>

  <div id="carousel" class="hidden" aria-label="Prints in selected view">
    <div id="listings" class="carousel-track">
      <div id="skeletons">
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
      </div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.21.0/mapbox-gl.js"></script>
  <script src="app.js?v=20260715-3"></script>
</body>
</html>
