<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preciso Print Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="map"></div>

  <div id="google-ui">
   
   

    <aside id="place-sheet" class="place-sheet hidden" aria-label="Place details">
      <div class="place-sheet-handle"></div>

      <div class="place-sheet-header">
        <div>
          <h2 id="sheet-title">Place title</h2>
          <div id="sheet-subtitle" class="sheet-subtitle">Category · Distance</div>
        </div>

        <div class="sheet-icon-actions">
          <button id="sheet-save" type="button" aria-label="Save place">☆</button>
          <button id="sheet-share" type="button" aria-label="Share place">↗</button>
          <button id="sheet-close" type="button" aria-label="Close place details">✕</button>
        </div>
      </div>

      <div class="sheet-actions">
        <button id="sheet-directions" class="sheet-pill primary" type="button">Directions</button>
        <button class="sheet-pill" type="button">Start</button>
        <button class="sheet-pill" type="button">Ask</button>
        <button class="sheet-pill" type="button">Order</button>
      </div>

      <div class="sheet-media">
        <img id="sheet-image-main" src="" alt="">
        <div class="sheet-media-stack">
          <img id="sheet-image-side-1" src="" alt="">
          <img id="sheet-image-side-2" src="" alt="">
        </div>
      </div>

      <div class="sheet-tabs">
        <button class="active" type="button">Overview</button>
        <button type="button">Menu</button>
        <button type="button">Reviews</button>
        <button type="button">Photos</button>
        <button type="button">Updates</button>
      </div>

      <div class="sheet-info-card">
        <div class="sheet-info-title">Know before you go <span>New!</span></div>
        <div id="sheet-info-text" class="sheet-info-text">Helpful info about this location.</div>
      </div>
    </aside>

    <div class="gm-fabs">
      <button class="gm-fab" type="button" aria-label="Layers">◫</button>
      <button id="gm-reset" class="gm-fab" type="button" aria-label="Reset map">⌖</button>
    </div>
  </div>

  <div id="header">
    <a href="https://precisoart.myshopify.com" target="_blank" rel="noopener noreferrer" class="logo-link">
      <img src="logo.png" alt="Preciso" class="logo">
    </a>
  </div>

  <div id="carousel">
    <div id="listings" class="carousel-track">
      <div id="skeletons">
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
        <div class="card skeleton"></div>
      </div>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
