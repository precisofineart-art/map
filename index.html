.sheet-media img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  object-position: center;
  border-radius: 16px;
}

@media (min-width: 768px) {
  .sheet-media img {
    height: 380px;
  }
}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preciso Print Map</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main id="map" aria-label="Product map"></main>

  <aside id="place-sheet" class="place-sheet hidden" aria-label="Place details">
    <div class="place-sheet-handle"></div>

    <div class="place-sheet-header">
      <div>
        <h2 id="sheet-title"></h2>
        <div id="sheet-time" class="sheet-time"></div>
        <div id="sheet-subtitle" class="sheet-subtitle"></div>
      </div>

      <button id="sheet-close" type="button">✕</button>
    </div>

    <div class="sheet-media">
      <img id="sheet-image-main" src="" alt="" />
    </div>

    <div class="sheet-cta">
      <a id="sheet-product-link" href="#" target="_blank">Buy Print</a>
    </div>
  </aside>

  <header id="header" class="app-header">
    <div class="header-inner">
      <img src="logo.png" alt="Preciso" class="logo" />
    </div>

    <div class="region-pills">
      <button class="region-pill active" data-region="all">All</button>
      <button class="region-pill" data-region="northAmerica">North America</button>
      <button class="region-pill" data-region="caribbean">Caribbean</button>
      <button class="region-pill" data-region="europe">Europe</button>
      <button class="region-pill" data-region="asia">Asia</button>
    </div>
  </header>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
